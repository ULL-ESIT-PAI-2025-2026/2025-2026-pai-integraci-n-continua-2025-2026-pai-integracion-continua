# This workflow is triggered manually from the Actions tab in GitHub
name: Push to Live

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  save-push-to-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Save push-to-live.yml
        uses: actions/upload-artifact@v3
        with:
          name: push-to-live.yml
          path: .github/workflows/push_to_live.yml
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge staging into main and push
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git checkout main
          git merge origin/staging -m "Merge staging into main"
          git push origin main --force
      - name: push artifact
        uses: actions/upload-artifact@v3
        with:
          name: push-to-live.yml
          path: .github/workflows/push_to_live.yml
      - name: Download push-to-live.yml
        uses: actions/download-artifact@v3
        with:
          name: push-to-live.yml
          path: .github/workflows/push_to_live.yml
      - name: Commit and push push-to-live.yml
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add .github/workflows/push_to_live.yml
          git commit -m "Update push-to-live.yml"
          git push origin main

