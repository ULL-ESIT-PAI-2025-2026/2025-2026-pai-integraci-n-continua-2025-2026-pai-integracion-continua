# environment variables
name: Environment Variables
on:
  push:
    branches:
      - github-actions-fundamentals
  workflow_dispatch:
env:
  DEPLOY_BRANCH: github-actions-fundamentals
  ENVIRONMENT_NAME: production
jobs:
  print_env:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT_NAME: staging
    steps:
      - name: Print environment variables
        run: |
          echo "The deploy branch is: $DEPLOY_BRANCH"
          echo "The environment name is: $ENVIRONMENT_NAME" 
          echo "The environment name in the step is: $ENVIRONMENT_NAME"
  print_env_from_another_job:
    needs: print_env
    runs-on: ubuntu-latest
    steps:
      - name: Print environment variables from another job
        run: |
          echo "The deploy branch is: $DEPLOY_BRANCH"
          echo "The environment name is: $ENVIRONMENT_NAME"    