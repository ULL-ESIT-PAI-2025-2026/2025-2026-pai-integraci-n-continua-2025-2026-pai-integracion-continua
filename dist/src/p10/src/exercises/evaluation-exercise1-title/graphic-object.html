<body>

  <header>
    <span class="author">Marco Pérez Padilla</span>

  <main>
    <section id="canvas-section">
      <canvas id="graphic-canvas" class="game-canvas"></canvas>
    </section>

    <div class="controls">
      <button class="control-button" id="button-up">Up</button>
      <div class="row">
        <button class="control-button" id="button-left">Left</button>
        <button class="control-button" id="button-right">Right</button>
      </div>
      <button class="control-button" id="button-down">Down</button>
    </div>

    <label for="speed-input">Speed</label>
    <input id="speed-input" type="number" value="10" min="1" max="500" class="speed-input">
